name: linkedin-comment-hourly

on:
  schedule:
    # 05:28 UTC Tue–Fri -> 07:28 Podgorica summer / 06:28 winter. GH cron
    # regularly fires late (0–2h+ observed on this repo) — acceptable for a
    # morning drafts drop. Off-hour minute: on-the-hour slots are the most
    # contended on GitHub's scheduler and the 04:00 fire was dropped entirely
    # on 2026-07-21.
    - cron: "28 5 * * 2-5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# A late cron fire must queue behind a manual dispatch, never overlap it —
# both drive the same logged-in Chrome profile. (Cross-workflow overlap with
# linkedin-stats-weekly is already impossible: the single self-hosted runner
# processes one job at a time.)
concurrency:
  group: linkedin-comment-hourly
  cancel-in-progress: false

jobs:
  draft:
    runs-on: [self-hosted, macOS]
    # Outer backstop above run-hourly.sh's own watchdogs (420s per gather
    # attempt, one 30-min heal session, 40-min drafting) plus the commit/PR/
    # merge chains. The in-script watchdogs must win: they still commit
    # partial drafts, land the heal branch, and sweep the orphaned browser,
    # while a runner-level kill loses all of that and gives the EXIT-trap
    # Slack bookend only ~10s to post.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run comment-drafts pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.claude/skills/linkedin-comment-hourly/run-hourly.sh
