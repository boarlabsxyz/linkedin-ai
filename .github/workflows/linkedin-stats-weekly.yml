name: linkedin-stats-weekly

on:
  schedule:
    # 00:00 UTC Mon -> 02:00 Kyiv winter / 03:00 Kyiv summer
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run weekly scrape
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: ./.claude/skills/linkedin-stats/run-weekly.sh
      - name: Emit flat stats.json for Grafana
        run: node .github/scripts/build-stats-json.mjs --out dashboards/observable/dist/stats.json
      - name: Upload Observable dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboards/observable/dist

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
