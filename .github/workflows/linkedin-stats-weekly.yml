name: linkedin-stats-weekly

on:
  schedule:
    # 00:00 UTC Mon -> 02:00 Kyiv winter / 03:00 Kyiv summer
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: [self-hosted, macOS]
    # Generous backstop: the in-script watchdogs (per-attempt deadline, heal
    # and review caps) are what bound the run — they must win over this or
    # partial commits and the incident doc are lost to a runner-level kill.
    timeout-minutes: 6000
    outputs:
      main_updated: ${{ steps.scrape.outputs.main_updated }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run weekly scrape
        id: scrape
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.claude/skills/linkedin-stats/run-weekly.sh

  publish:
    needs: scrape
    # A healed/partial run leaves its data on an unmerged PR — republishing
    # stale main would be a no-op; skip until the PR is merged (then use
    # pages-deploy.yml to publish manually).
    if: needs.scrape.outputs.main_updated == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Emit flat stats.json for Grafana
        run: |
          mkdir -p pages-dist
          node .github/scripts/build-stats-json.mjs --out pages-dist/stats.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist
      - id: deployment
        uses: actions/deploy-pages@v4
