name: runner-diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 10
    steps:
      - name: Identity + paths
        run: |
          echo "==== whoami / id / HOME ===="
          whoami
          id
          echo "HOME=$HOME"
          echo "USER=$USER"
          echo "LOGNAME=$LOGNAME"
          echo
          echo "==== SSH_AUTH_SOCK / logind session ===="
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK:-<unset>}"
          echo "TMPDIR=${TMPDIR:-<unset>}"
          echo
          echo "==== which claude ===="
          which claude || true
          claude --version 2>/dev/null || true
          echo
          echo "==== \$HOME/.claude* listing ===="
          ls -la "$HOME" 2>/dev/null | grep -Ei "claude|\.config" || echo "(nothing matched)"
          echo
          echo "==== ~/.claude.json (top-level keys + connectors) ===="
          if [ -f "$HOME/.claude.json" ]; then
            echo "size: $(wc -c < "$HOME/.claude.json") bytes"
            jq 'keys' "$HOME/.claude.json" 2>/dev/null || echo "(not valid JSON)"
            echo "-- mcpServers (top-level):"
            jq '.mcpServers // "(none)"' "$HOME/.claude.json" 2>/dev/null | head -60
            echo "-- claudeAiConnectors:"
            jq '.claudeAiConnectors // .connectors // "(none)"' "$HOME/.claude.json" 2>/dev/null | head -60
            echo "-- OAuth-ish fields (redacted lengths):"
            jq 'to_entries | map(select(.key | test("token|oauth|auth"; "i"))) | map({key, len: (.value|tostring|length)})' "$HOME/.claude.json" 2>/dev/null
          else
            echo "(no ~/.claude.json for this user)"
          fi
          echo
          echo "==== other user homes on box (perm-check) ===="
          ls -la /Users 2>/dev/null | head -20
          echo
          echo "==== .claude.json presence for likely users ===="
          for U in peterovchinnikov peterovchyn peter runner _runner github-runner ghrunner; do
            F="/Users/$U/.claude.json"
            if [ -e "$F" ]; then
              echo "$F  →  exists  ($(stat -f %Su:%Sg "$F" 2>/dev/null))  size=$(wc -c < "$F" 2>/dev/null)"
            fi
          done

      - name: Full env dump (redacted values, sorted keys)
        run: |
          echo "==== env (values replaced with <LEN=n>, keys sorted) ===="
          env -0 | tr '\0' '\n' | awk -F= '
            { key=$1; sub(/^[^=]*=/,"",$0); val=$0;
              # redact suspicious keys entirely
              if (key ~ /(TOKEN|SECRET|KEY|PASSWORD|AUTHZ|AUTHORIZATION|COOKIE|CREDENTIAL|SESSION|APIKEY|OAUTH|BEARER)/) {
                printf "%s=<REDACTED:LEN=%d>\n", key, length(val);
              } else if (length(val) > 200) {
                printf "%s=<LONG:LEN=%d>: %s...\n", key, length(val), substr(val,1,200);
              } else {
                printf "%s=%s\n", key, val;
              }
            }
          ' | sort

      - name: What MCP servers does claude -p actually see
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo 'List every MCP server currently registered in this session. Reply with a compact JSON array of the server names, then STOP.' \
            | claude -p \
                --dangerously-skip-permissions \
                --output-format stream-json --verbose \
              | jq -r --unbuffered '
                  .description
                  // (.message?.content? | arrays | map(select(.type=="text") | .text) | .[])
                  // (select(.is_error == true or .error) | "ERROR: \(.error // .message?.content)")
                  // empty
                '
