name: pages-deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboards/observable/package-lock.json
      - run: npm --prefix dashboards/observable ci --prefer-offline --no-audit
      - run: npm --prefix dashboards/observable run build
      - name: Emit flat stats.json for Grafana
        run: node .github/scripts/build-stats-json.mjs --out dashboards/observable/dist/stats.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboards/observable/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
